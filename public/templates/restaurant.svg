<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="rs-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf8f0"/>
      <stop offset="100%" stop-color="#f5ead8"/>
    </linearGradient>
    <linearGradient id="rs-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="rs-blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#rs-bg)"/>
  <!-- Warm editorial glows -->
  <circle cx="650" cy="150" r="300" fill="#f59e0b" opacity="0.09" filter="url(#rs-blur)"/>
  <circle cx="100" cy="400" r="200" fill="#d97706" opacity="0.06" filter="url(#rs-blur)"/>

  <!-- Navbar - editorial style -->
  <rect width="800" height="52" fill="#fffcf5" opacity="0.97"/>
  <rect x="0" y="51" width="800" height="1" fill="#f0e0c0"/>
  <!-- Logo - editorial style -->
  <rect x="32" y="14" width="120" height="14" rx="2" fill="#1c1008" opacity="0.82"/>
  <rect x="32" y="32" width="80" height="9" rx="2" fill="#78350f" opacity="0.4"/>
  <!-- Nav items -->
  <rect x="290" y="21" width="58" height="9" rx="3" fill="#78350f" opacity="0.45"/>
  <rect x="364" y="21" width="58" height="9" rx="3" fill="#78350f" opacity="0.45"/>
  <rect x="438" y="21" width="58" height="9" rx="3" fill="#78350f" opacity="0.45"/>
  <!-- CTA button -->
  <rect x="630" y="13" width="138" height="26" rx="6" fill="#b45309"/>
  <rect x="658" y="20" width="82" height="12" rx="3" fill="#fff" opacity="0.9"/>

  <!-- Hero - editorial full-bleed style -->
  <!-- Large hero image panel -->
  <rect x="0" y="52" width="800" height="240" fill="url(#rs-hero)" opacity="0.16"/>
  <!-- Editorial image frame right side -->
  <rect x="440" y="60" width="348" height="224" rx="0" fill="url(#rs-hero)" opacity="0.25"/>
  <!-- Plate/food illustration in hero -->
  <circle cx="614" cy="172" r="72" fill="#d97706" opacity="0.12"/>
  <circle cx="614" cy="172" r="54" fill="#b45309" opacity="0.15"/>
  <circle cx="614" cy="172" r="36" fill="#d97706" opacity="0.20"/>
  <ellipse cx="614" cy="180" rx="20" ry="14" fill="#78350f" opacity="0.25"/>
  <!-- Fork and knife -->
  <line x1="696" y1="130" x2="696" y2="218" stroke="#b45309" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="532" y1="130" x2="532" y2="218" stroke="#b45309" stroke-width="2" stroke-opacity="0.5"/>
  <!-- Text overlay on hero -->
  <rect x="32" y="78" width="160" height="10" rx="3" fill="#b45309" opacity="0.6"/>
  <!-- Big editorial headline -->
  <rect x="32" y="102" width="360" height="38" rx="3" fill="#1c1008" opacity="0.88"/>
  <rect x="32" y="148" width="320" height="26" rx="3" fill="#1c1008" opacity="0.7"/>
  <!-- Italic sub text -->
  <rect x="32" y="188" width="280" height="10" rx="3" fill="#78350f" opacity="0.55"/>
  <rect x="32" y="205" width="240" height="10" rx="3" fill="#78350f" opacity="0.4"/>
  <!-- CTA buttons -->
  <rect x="32" y="228" width="152" height="38" rx="6" fill="#b45309"/>
  <rect x="56" y="241" width="104" height="12" rx="3" fill="#fff" opacity="0.9"/>
  <rect x="198" y="228" width="150" height="38" rx="6" fill="none" stroke="#b45309" stroke-width="1.5"/>
  <rect x="222" y="241" width="102" height="12" rx="3" fill="#78350f" opacity="0.75"/>

  <!-- Film-strip gallery -->
  <rect x="0" y="296" width="800" height="16" fill="#f0e0c0" opacity="0.6"/>
  <rect x="0" y="296" width="800" height="1" fill="#d4a96a" opacity="0.5"/>
  <rect x="0" y="310" width="800" height="1" fill="#d4a96a" opacity="0.5"/>
  <!-- Film perforations -->
  <rect x="8" y="299" width="8" height="10" rx="2" fill="#fff" opacity="0.6"/>
  <rect x="28" y="299" width="8" height="10" rx="2" fill="#fff" opacity="0.6"/>
  <rect x="48" y="299" width="8" height="10" rx="2" fill="#fff" opacity="0.6"/>
  <rect x="68" y="299" width="8" height="10" rx="2" fill="#fff" opacity="0.6"/>
  <rect x="724" y="299" width="8" height="10" rx="2" fill="#fff" opacity="0.6"/>
  <rect x="744" y="299" width="8" height="10" rx="2" fill="#fff" opacity="0.6"/>
  <rect x="764" y="299" width="8" height="10" rx="2" fill="#fff" opacity="0.6"/>
  <rect x="784" y="299" width="8" height="10" rx="2" fill="#fff" opacity="0.6"/>

  <!-- Gallery frames - film style -->
  <rect x="16" y="316" width="168" height="100" rx="0" fill="url(#rs-hero)" opacity="0.22"/>
  <rect x="16" y="316" width="168" height="100" fill="none" stroke="#d4a96a" stroke-width="1"/>
  <circle cx="100" cy="366" r="26" fill="#b45309" opacity="0.15"/>
  <rect x="28" y="400" width="60" height="8" rx="2" fill="#1c1008" opacity="0.5"/>

  <rect x="200" y="316" width="168" height="100" rx="0" fill="url(#rs-hero)" opacity="0.18"/>
  <rect x="200" y="316" width="168" height="100" fill="none" stroke="#d4a96a" stroke-width="1"/>
  <ellipse cx="284" cy="360" rx="36" ry="28" fill="#d97706" opacity="0.12"/>
  <rect x="212" y="400" width="80" height="8" rx="2" fill="#1c1008" opacity="0.5"/>

  <rect x="384" y="316" width="168" height="100" rx="0" fill="url(#rs-hero)" opacity="0.22"/>
  <rect x="384" y="316" width="168" height="100" fill="none" stroke="#d4a96a" stroke-width="1"/>
  <circle cx="468" cy="358" rx="30" ry="30" fill="#f59e0b" opacity="0.12"/>
  <rect x="396" y="400" width="70" height="8" rx="2" fill="#1c1008" opacity="0.5"/>

  <rect x="568" y="316" width="168" height="100" rx="0" fill="url(#rs-hero)" opacity="0.18"/>
  <rect x="568" y="316" width="168" height="100" fill="none" stroke="#d4a96a" stroke-width="1"/>
  <rect x="580" y="400" width="100" height="8" rx="2" fill="#1c1008" opacity="0.5"/>
  <!-- Star rating decoration in last cell -->
  <text x="620" y="368" font-size="14" fill="#f59e0b" opacity="0.6" text-anchor="middle">★★★★★</text>

  <!-- Film strip bottom line -->
  <rect x="0" y="416" width="800" height="16" fill="#f0e0c0" opacity="0.6"/>
  <rect x="0" y="416" width="800" height="1" fill="#d4a96a" opacity="0.5"/>
  <rect x="0" y="430" width="800" height="1" fill="#d4a96a" opacity="0.5"/>
  <rect x="8" y="419" width="8" height="10" rx="2" fill="#fff" opacity="0.6"/>
  <rect x="28" y="419" width="8" height="10" rx="2" fill="#fff" opacity="0.6"/>
  <rect x="748" y="419" width="8" height="10" rx="2" fill="#fff" opacity="0.6"/>
  <rect x="768" y="419" width="8" height="10" rx="2" fill="#fff" opacity="0.6"/>

  <!-- Bottom CTA block -->
  <rect x="0" y="436" width="800" height="64" fill="#fffcf5" opacity="0.9"/>
  <rect x="0" y="436" width="800" height="1" fill="#f0e0c0"/>
  <rect x="32" y="450" width="220" height="14" rx="3" fill="#1c1008" opacity="0.72"/>
  <rect x="32" y="470" width="300" height="9" rx="3" fill="#78350f" opacity="0.4"/>
  <rect x="600" y="448" width="168" height="34" rx="17" fill="#b45309"/>
  <rect x="632" y="459" width="104" height="12" rx="3" fill="#fff" opacity="0.9"/>
</svg>
