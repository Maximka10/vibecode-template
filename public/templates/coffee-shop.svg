<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="cb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf6f1"/>
      <stop offset="100%" stop-color="#f0e8da"/>
    </linearGradient>
    <linearGradient id="cb-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="cb-card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="cb-blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#cb-bg)"/>

  <!-- Warm glow orb -->
  <circle cx="560" cy="180" r="200" fill="#d97706" opacity="0.12" filter="url(#cb-blur)"/>
  <circle cx="150" cy="350" r="150" fill="#f59e0b" opacity="0.08" filter="url(#cb-blur)"/>

  <!-- Navbar -->
  <rect width="800" height="52" fill="#fffdf9" opacity="0.95"/>
  <rect x="0" y="51" width="800" height="1" fill="#e8d5c0"/>
  <!-- Logo -->
  <rect x="32" y="16" width="10" height="20" rx="2" fill="#92400e"/>
  <rect x="46" y="16" width="70" height="10" rx="3" fill="#1c1410" opacity="0.7"/>
  <rect x="46" y="30" width="50" height="8" rx="2" fill="#6b4f3a" opacity="0.4"/>
  <!-- Nav links -->
  <rect x="360" y="21" width="48" height="10" rx="3" fill="#6b4f3a" opacity="0.5"/>
  <rect x="422" y="21" width="48" height="10" rx="3" fill="#6b4f3a" opacity="0.5"/>
  <rect x="484" y="21" width="48" height="10" rx="3" fill="#6b4f3a" opacity="0.5"/>
  <!-- CTA button -->
  <rect x="634" y="13" width="134" height="26" rx="13" fill="#d97706"/>
  <rect x="660" y="20" width="82" height="12" rx="3" fill="#fff" opacity="0.9"/>

  <!-- Hero section -->
  <!-- Badge -->
  <rect x="32" y="80" width="170" height="26" rx="13" fill="#d97706" opacity="0.12"/>
  <rect x="32" y="80" width="170" height="26" rx="13" fill="none" stroke="#d97706" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="50" y="89" width="130" height="8" rx="3" fill="#92400e" opacity="0.6"/>
  <!-- Headline -->
  <rect x="32" y="120" width="300" height="28" rx="4" fill="#1c1410" opacity="0.85"/>
  <rect x="32" y="156" width="360" height="20" rx="4" fill="#1c1410" opacity="0.7"/>
  <!-- Subtext -->
  <rect x="32" y="194" width="320" height="10" rx="3" fill="#6b4f3a" opacity="0.55"/>
  <rect x="32" y="210" width="280" height="10" rx="3" fill="#6b4f3a" opacity="0.4"/>
  <rect x="32" y="226" width="240" height="10" rx="3" fill="#6b4f3a" opacity="0.3"/>
  <!-- CTA buttons -->
  <rect x="32" y="254" width="160" height="40" rx="20" fill="#d97706"/>
  <rect x="66" y="268" width="92" height="12" rx="3" fill="#fff" opacity="0.9"/>
  <rect x="206" y="254" width="140" height="40" rx="20" fill="none" stroke="#d97706" stroke-width="1.5"/>
  <rect x="232" y="268" width="88" height="12" rx="3" fill="#92400e" opacity="0.7"/>

  <!-- Hero image panel -->
  <rect x="460" y="68" width="312" height="230" rx="20" fill="url(#cb-hero)" opacity="0.18"/>
  <rect x="460" y="68" width="312" height="230" rx="20" fill="none" stroke="#d97706" stroke-width="1" stroke-opacity="0.25"/>
  <!-- Coffee cup illustration lines -->
  <ellipse cx="616" cy="140" rx="60" ry="58" fill="#d97706" opacity="0.15"/>
  <ellipse cx="616" cy="140" rx="40" ry="38" fill="#92400e" opacity="0.20"/>
  <rect x="590" y="180" width="52" height="8" rx="4" fill="#d97706" opacity="0.5"/>
  <rect x="596" y="192" width="40" height="20" rx="6" fill="#92400e" opacity="0.3"/>
  <ellipse cx="644" cy="196" rx="8" ry="12" fill="none" stroke="#d97706" stroke-width="2" stroke-opacity="0.4"/>
  <!-- Steam lines -->
  <path d="M 600 155 Q 596 145 602 135" stroke="#d97706" stroke-width="2" fill="none" stroke-opacity="0.35"/>
  <path d="M 616 152 Q 612 142 618 132" stroke="#d97706" stroke-width="2" fill="none" stroke-opacity="0.35"/>
  <path d="M 632 155 Q 628 145 634 135" stroke="#d97706" stroke-width="2" fill="none" stroke-opacity="0.35"/>
  <!-- Decorative text lines -->
  <rect x="480" y="240" width="100" height="8" rx="3" fill="#6b4f3a" opacity="0.3"/>
  <rect x="480" y="254" width="70" height="8" rx="3" fill="#6b4f3a" opacity="0.2"/>
  <rect x="636" y="240" width="110" height="8" rx="3" fill="#6b4f3a" opacity="0.3"/>
  <rect x="636" y="254" width="80" height="8" rx="3" fill="#6b4f3a" opacity="0.2"/>

  <!-- Stats bar -->
  <rect x="0" y="316" width="800" height="72" fill="#fff" opacity="0.65"/>
  <rect x="0" y="316" width="800" height="1" fill="#e8d5c0"/>
  <rect x="0" y="387" width="800" height="1" fill="#e8d5c0"/>
  <!-- 4 stats -->
  <rect x="80" y="332" width="60" height="20" rx="4" fill="#d97706" opacity="0.8"/>
  <rect x="74" y="358" width="72" height="8" rx="3" fill="#6b4f3a" opacity="0.5"/>
  <rect x="272" y="332" width="80" height="20" rx="4" fill="#92400e" opacity="0.6"/>
  <rect x="270" y="358" width="84" height="8" rx="3" fill="#6b4f3a" opacity="0.5"/>
  <rect x="464" y="332" width="60" height="20" rx="4" fill="#d97706" opacity="0.8"/>
  <rect x="458" y="358" width="72" height="8" rx="3" fill="#6b4f3a" opacity="0.5"/>
  <rect x="650" y="332" width="80" height="20" rx="4" fill="#92400e" opacity="0.6"/>
  <rect x="648" y="358" width="84" height="8" rx="3" fill="#6b4f3a" opacity="0.5"/>

  <!-- Services section -->
  <rect x="32" y="404" width="356" height="80" rx="14" fill="#fff" opacity="0.75"/>
  <rect x="32" y="404" width="356" height="80" rx="14" fill="none" stroke="#e8d5c0" stroke-width="1"/>
  <rect x="52" y="422" width="120" height="12" rx="3" fill="#1c1410" opacity="0.65"/>
  <rect x="52" y="442" width="200" height="8" rx="3" fill="#6b4f3a" opacity="0.4"/>
  <rect x="52" y="456" width="160" height="8" rx="3" fill="#6b4f3a" opacity="0.3"/>
  <!-- Check icon -->
  <circle cx="344" cy="444" r="14" fill="#d97706" opacity="0.15"/>
  <path d="M 337 444 l 4 4 l 8 -8" stroke="#d97706" stroke-width="2" fill="none"/>

  <rect x="412" y="404" width="356" height="80" rx="14" fill="#fff" opacity="0.75"/>
  <rect x="412" y="404" width="356" height="80" rx="14" fill="none" stroke="#e8d5c0" stroke-width="1"/>
  <rect x="432" y="422" width="100" height="12" rx="3" fill="#1c1410" opacity="0.65"/>
  <rect x="432" y="442" width="180" height="8" rx="3" fill="#6b4f3a" opacity="0.4"/>
  <rect x="432" y="456" width="140" height="8" rx="3" fill="#6b4f3a" opacity="0.3"/>
  <circle cx="724" cy="444" r="14" fill="#d97706" opacity="0.15"/>
  <path d="M 717 444 l 4 4 l 8 -8" stroke="#d97706" stroke-width="2" fill="none"/>
</svg>
