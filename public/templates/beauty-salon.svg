<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bs-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf4f7"/>
      <stop offset="100%" stop-color="#fce8f1"/>
    </linearGradient>
    <linearGradient id="bs-hero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d174d"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="bs-glow">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="bs-soft">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bs-bg)"/>
  <!-- Glow orbs -->
  <circle cx="400" cy="160" r="300" fill="#f472b6" opacity="0.10" filter="url(#bs-glow)"/>
  <circle cx="700" cy="400" r="180" fill="#be185d" opacity="0.08" filter="url(#bs-soft)"/>
  <circle cx="100" cy="420" r="150" fill="#f9a8d4" opacity="0.1" filter="url(#bs-soft)"/>

  <!-- Navbar -->
  <rect width="800" height="52" fill="#fff" opacity="0.96"/>
  <rect x="0" y="51" width="800" height="1" fill="#fbcfe8"/>
  <!-- Logo -->
  <ellipse cx="44" cy="26" rx="12" ry="14" fill="none" stroke="#be185d" stroke-width="2"/>
  <rect x="62" y="18" width="68" height="10" rx="3" fill="#1a0510" opacity="0.7"/>
  <rect x="62" y="32" width="50" height="7" rx="2" fill="#831843" opacity="0.35"/>
  <!-- Nav links -->
  <rect x="310" y="21" width="55" height="9" rx="3" fill="#831843" opacity="0.4"/>
  <rect x="380" y="21" width="55" height="9" rx="3" fill="#831843" opacity="0.4"/>
  <rect x="450" y="21" width="55" height="9" rx="3" fill="#831843" opacity="0.4"/>
  <!-- CTA pill button -->
  <rect x="630" y="12" width="138" height="28" rx="14" fill="#be185d"/>
  <rect x="658" y="20" width="82" height="10" rx="3" fill="#fff" opacity="0.9"/>

  <!-- Hero - centered layout -->
  <!-- Badge -->
  <rect x="290" y="74" width="220" height="24" rx="12" fill="#be185d" opacity="0.10"/>
  <rect x="290" y="74" width="220" height="24" rx="12" fill="none" stroke="#be185d" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="316" y="82" width="168" height="8" rx="3" fill="#9d174d" opacity="0.6"/>
  <!-- Big centered headline -->
  <rect x="150" y="112" width="500" height="32" rx="5" fill="#1a0510" opacity="0.82"/>
  <rect x="200" y="152" width="400" height="22" rx="4" fill="#1a0510" opacity="0.65"/>
  <!-- Subtext -->
  <rect x="220" y="192" width="360" height="9" rx="3" fill="#831843" opacity="0.5"/>
  <rect x="260" y="207" width="280" height="9" rx="3" fill="#831843" opacity="0.38"/>
  <!-- Two CTAs -->
  <rect x="252" y="234" width="140" height="40" rx="20" fill="#be185d"/>
  <rect x="280" y="248" width="84" height="12" rx="3" fill="#fff" opacity="0.9"/>
  <rect x="408" y="234" width="140" height="40" rx="20" fill="none" stroke="#be185d" stroke-width="1.5"/>
  <rect x="434" y="248" width="88" height="12" rx="3" fill="#be185d" opacity="0.8"/>

  <!-- 3-column gallery row -->
  <rect x="32" y="296" width="234" height="130" rx="16" fill="#fff" opacity="0.8"/>
  <rect x="32" y="296" width="234" height="130" rx="16" fill="none" stroke="#fbcfe8" stroke-width="1.5"/>
  <rect x="32" y="296" width="234" height="80" rx="16" fill="url(#bs-hero)" opacity="0.25"/>
  <rect x="32" y="355" width="234" height="1" fill="#fbcfe8"/>
  <rect x="48" y="368" width="100" height="10" rx="3" fill="#1a0510" opacity="0.6"/>
  <rect x="48" y="384" width="160" height="8" rx="3" fill="#831843" opacity="0.35"/>
  <!-- Decorative diamond -->
  <rect x="198" y="318" width="16" height="16" rx="2" fill="#f472b6" opacity="0.4" transform="rotate(45 206 326)"/>

  <rect x="283" y="296" width="234" height="130" rx="16" fill="#fff" opacity="0.8"/>
  <rect x="283" y="296" width="234" height="130" rx="16" fill="none" stroke="#fbcfe8" stroke-width="1.5"/>
  <rect x="283" y="296" width="234" height="80" rx="16" fill="url(#bs-hero)" opacity="0.20"/>
  <ellipse cx="400" cy="336" rx="28" ry="28" fill="#f472b6" opacity="0.15"/>
  <ellipse cx="400" cy="336" rx="16" ry="16" fill="#be185d" opacity="0.2"/>
  <rect x="283" y="355" width="234" height="1" fill="#fbcfe8"/>
  <rect x="299" y="368" width="80" height="10" rx="3" fill="#1a0510" opacity="0.6"/>
  <rect x="299" y="384" width="140" height="8" rx="3" fill="#831843" opacity="0.35"/>

  <rect x="534" y="296" width="234" height="130" rx="16" fill="#fff" opacity="0.8"/>
  <rect x="534" y="296" width="234" height="130" rx="16" fill="none" stroke="#fbcfe8" stroke-width="1.5"/>
  <rect x="534" y="296" width="234" height="80" rx="16" fill="url(#bs-hero)" opacity="0.22"/>
  <rect x="534" y="355" width="234" height="1" fill="#fbcfe8"/>
  <rect x="550" y="368" width="110" height="10" rx="3" fill="#1a0510" opacity="0.6"/>
  <rect x="550" y="384" width="170" height="8" rx="3" fill="#831843" opacity="0.35"/>
  <circle cx="714" cy="318" r="18" fill="#f9a8d4" opacity="0.3"/>

  <!-- Bottom service cards -->
  <rect x="32" y="440" width="360" height="48" rx="12" fill="#fff" opacity="0.7"/>
  <rect x="32" y="440" width="360" height="48" rx="12" fill="none" stroke="#fbcfe8" stroke-width="1"/>
  <circle cx="60" cy="464" r="10" fill="#be185d" opacity="0.15"/>
  <rect x="80" y="455" width="130" height="10" rx="3" fill="#1a0510" opacity="0.6"/>
  <rect x="80" y="471" width="200" height="8" rx="3" fill="#831843" opacity="0.35"/>

  <rect x="408" y="440" width="360" height="48" rx="12" fill="#fff" opacity="0.7"/>
  <rect x="408" y="440" width="360" height="48" rx="12" fill="none" stroke="#fbcfe8" stroke-width="1"/>
  <circle cx="436" cy="464" r="10" fill="#be185d" opacity="0.15"/>
  <rect x="456" y="455" width="110" height="10" rx="3" fill="#1a0510" opacity="0.6"/>
  <rect x="456" y="471" width="180" height="8" rx="3" fill="#831843" opacity="0.35"/>
</svg>
