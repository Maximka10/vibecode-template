<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="cw-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020d18"/>
      <stop offset="100%" stop-color="#041525"/>
    </linearGradient>
    <linearGradient id="cw-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#075985"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="cw-glow">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    <filter id="cw-neon">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#cw-bg)"/>
  <!-- Neon glow orbs -->
  <circle cx="180" cy="220" r="280" fill="#0ea5e9" opacity="0.07" filter="url(#cw-glow)"/>
  <circle cx="700" cy="280" r="220" fill="#38bdf8" opacity="0.05" filter="url(#cw-glow)"/>

  <!-- Grid lines (geometric style) -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#0c2d45" stroke-width="1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#0c2d45" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#0c2d45" stroke-width="1"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#0c2d45" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="500" stroke="#0c2d45" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="500" stroke="#0c2d45" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="#0c2d45" stroke-width="1"/>

  <!-- Navbar -->
  <rect width="800" height="52" fill="#030f1e" opacity="0.97"/>
  <rect x="0" y="51" width="800" height="1" fill="#0c2d45"/>
  <!-- Logo with tech look -->
  <rect x="30" y="14" width="24" height="24" rx="4" fill="#0ea5e9" opacity="0.2"/>
  <rect x="30" y="14" width="24" height="24" rx="4" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
  <rect x="38" y="22" width="8" height="8" rx="1" fill="#38bdf8" opacity="0.8"/>
  <rect x="64" y="17" width="72" height="10" rx="3" fill="#f0f9ff" opacity="0.8"/>
  <rect x="64" y="31" width="50" height="7" rx="2" fill="#7dd3fc" opacity="0.4"/>
  <!-- Nav items -->
  <rect x="320" y="21" width="52" height="9" rx="3" fill="#7dd3fc" opacity="0.4"/>
  <rect x="388" y="21" width="52" height="9" rx="3" fill="#7dd3fc" opacity="0.4"/>
  <rect x="456" y="21" width="52" height="9" rx="3" fill="#7dd3fc" opacity="0.4"/>
  <!-- Cyan CTA -->
  <rect x="622" y="12" width="146" height="28" rx="5" fill="#0ea5e9"/>
  <rect x="622" y="12" width="146" height="28" rx="5" fill="#38bdf8" opacity="0.3" filter="url(#cw-neon)"/>
  <rect x="650" y="20" width="90" height="10" rx="3" fill="#020d18" opacity="0.9"/>

  <!-- Neon accent line -->
  <rect x="0" y="52" width="800" height="2" fill="#0ea5e9" opacity="0.25" filter="url(#cw-neon)"/>

  <!-- Hero section -->
  <!-- Cyan badge -->
  <rect x="32" y="74" width="180" height="24" rx="4" fill="#0ea5e9" opacity="0.1"/>
  <rect x="32" y="74" width="180" height="24" rx="4" fill="none" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.5"/>
  <rect x="48" y="82" width="148" height="8" rx="3" fill="#38bdf8" opacity="0.7"/>
  <!-- Headline -->
  <rect x="32" y="110" width="440" height="32" rx="4" fill="#f0f9ff" opacity="0.9"/>
  <rect x="32" y="150" width="380" height="22" rx="4" fill="#f0f9ff" opacity="0.7"/>
  <!-- Cyan accent line under headline -->
  <rect x="32" y="180" width="200" height="3" rx="1.5" fill="#0ea5e9" opacity="0.6"/>
  <!-- Subtext -->
  <rect x="32" y="196" width="350" height="9" rx="3" fill="#7dd3fc" opacity="0.5"/>
  <rect x="32" y="212" width="300" height="9" rx="3" fill="#7dd3fc" opacity="0.38"/>
  <!-- CTAs -->
  <rect x="32" y="240" width="164" height="40" rx="5" fill="#0ea5e9"/>
  <rect x="32" y="240" width="164" height="40" rx="5" fill="#38bdf8" opacity="0.2" filter="url(#cw-neon)"/>
  <rect x="62" y="254" width="104" height="12" rx="3" fill="#020d18" opacity="0.9"/>
  <rect x="212" y="240" width="156" height="40" rx="5" fill="none" stroke="#0ea5e9" stroke-width="1.5"/>
  <rect x="240" y="254" width="100" height="12" rx="3" fill="#38bdf8" opacity="0.7"/>

  <!-- Right side - car wash tech visual -->
  <rect x="480" y="62" width="292" height="236" rx="6" fill="#041525"/>
  <rect x="480" y="62" width="292" height="236" rx="6" fill="none" stroke="#0c2d45" stroke-width="1.5"/>
  <!-- Car silhouette -->
  <rect x="510" y="160" width="232" height="60" rx="12" fill="#0c2d45"/>
  <rect x="540" y="140" width="160" height="30" rx="8" fill="#0c2d45"/>
  <!-- Windows -->
  <rect x="548" y="144" width="60" height="22" rx="5" fill="#0ea5e9" opacity="0.15"/>
  <rect x="618" y="144" width="60" height="22" rx="5" fill="#0ea5e9" opacity="0.15"/>
  <!-- Wheels -->
  <circle cx="548" cy="222" r="18" fill="#020d18"/>
  <circle cx="548" cy="222" r="12" fill="#0c2d45"/>
  <circle cx="548" cy="222" r="6" fill="#0ea5e9" opacity="0.4"/>
  <circle cx="700" cy="222" r="18" fill="#020d18"/>
  <circle cx="700" cy="222" r="12" fill="#0c2d45"/>
  <circle cx="700" cy="222" r="6" fill="#0ea5e9" opacity="0.4"/>
  <!-- Water drops / wash effect -->
  <line x1="520" y1="90" x2="516" y2="135" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="560" y1="86" x2="556" y2="131" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="600" y1="84" x2="596" y2="129" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="640" y1="86" x2="636" y2="131" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="680" y1="88" x2="676" y2="133" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.5"/>
  <line x1="720" y1="90" x2="716" y2="135" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Cyan neon glow under car -->
  <rect x="520" y="240" width="212" height="2" rx="1" fill="#0ea5e9" opacity="0.6" filter="url(#cw-neon)"/>
  <rect x="520" y="240" width="212" height="8" rx="1" fill="#0ea5e9" opacity="0.07"/>

  <!-- Stats row - tech cards -->
  <rect x="0" y="316" width="800" height="72" fill="#030f1e" opacity="0.95"/>
  <rect x="0" y="316" width="800" height="1" fill="#0c2d45"/>
  <rect x="0" y="387" width="800" height="1" fill="#0c2d45"/>
  <rect x="60" y="328" width="100" height="22" rx="4" fill="#0ea5e9" opacity="0.8"/>
  <rect x="58" y="357" width="104" height="8" rx="3" fill="#7dd3fc" opacity="0.4"/>
  <rect x="255" y="328" width="90" height="22" rx="4" fill="#38bdf8" opacity="0.6"/>
  <rect x="250" y="357" width="100" height="8" rx="3" fill="#7dd3fc" opacity="0.4"/>
  <rect x="450" y="328" width="90" height="22" rx="4" fill="#0ea5e9" opacity="0.8"/>
  <rect x="446" y="357" width="100" height="8" rx="3" fill="#7dd3fc" opacity="0.4"/>
  <rect x="640" y="328" width="100" height="22" rx="4" fill="#38bdf8" opacity="0.6"/>
  <rect x="636" y="357" width="108" height="8" rx="3" fill="#7dd3fc" opacity="0.4"/>

  <!-- Services grid -->
  <rect x="32" y="400" width="358" height="84" rx="8" fill="#041525"/>
  <rect x="32" y="400" width="358" height="84" rx="8" fill="none" stroke="#0c2d45" stroke-width="1.5"/>
  <rect x="50" y="416" width="6" height="6" rx="1" fill="#0ea5e9" opacity="0.9"/>
  <rect x="64" y="414" width="120" height="12" rx="3" fill="#f0f9ff" opacity="0.75"/>
  <rect x="50" y="436" width="260" height="8" rx="3" fill="#7dd3fc" opacity="0.35"/>
  <rect x="50" y="450" width="220" height="8" rx="3" fill="#7dd3fc" opacity="0.25"/>
  <rect x="50" y="466" width="90" height="10" rx="3" fill="#0ea5e9" opacity="0.5"/>

  <rect x="408" y="400" width="358" height="84" rx="8" fill="#041525"/>
  <rect x="408" y="400" width="358" height="84" rx="8" fill="none" stroke="#0c2d45" stroke-width="1.5"/>
  <rect x="426" y="416" width="6" height="6" rx="1" fill="#0ea5e9" opacity="0.9"/>
  <rect x="440" y="414" width="100" height="12" rx="3" fill="#f0f9ff" opacity="0.75"/>
  <rect x="426" y="436" width="240" height="8" rx="3" fill="#7dd3fc" opacity="0.35"/>
  <rect x="426" y="450" width="200" height="8" rx="3" fill="#7dd3fc" opacity="0.25"/>
  <rect x="426" y="466" width="90" height="10" rx="3" fill="#0ea5e9" opacity="0.5"/>
</svg>
