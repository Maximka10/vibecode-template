<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="br-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="br-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#92400e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
    <filter id="br-glow">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="br-glow-sm">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#br-bg)"/>
  <!-- Noise texture pattern via micro rectangles -->
  <rect width="800" height="500" fill="#1a1400" opacity="0.3"/>
  <!-- Gold glow orbs -->
  <circle cx="200" cy="200" r="250" fill="#ca8a04" opacity="0.07" filter="url(#br-glow)"/>
  <circle cx="700" cy="350" r="200" fill="#eab308" opacity="0.05" filter="url(#br-glow)"/>

  <!-- Navbar - dark with gold accent -->
  <rect width="800" height="52" fill="#0f0f0f" opacity="0.98"/>
  <rect x="0" y="51" width="800" height="1" fill="#2a2a00" opacity="0.8"/>
  <!-- Gold barber pole accent -->
  <rect x="32" y="14" width="4" height="24" rx="2" fill="#eab308" opacity="0.9"/>
  <rect x="38" y="16" width="70" height="10" rx="3" fill="#f5f5f5" opacity="0.85"/>
  <rect x="38" y="30" width="48" height="7" rx="2" fill="#a3a3a3" opacity="0.45"/>
  <!-- Nav items -->
  <rect x="330" y="21" width="50" height="9" rx="3" fill="#a3a3a3" opacity="0.45"/>
  <rect x="396" y="21" width="50" height="9" rx="3" fill="#a3a3a3" opacity="0.45"/>
  <rect x="462" y="21" width="50" height="9" rx="3" fill="#a3a3a3" opacity="0.45"/>
  <!-- Gold CTA -->
  <rect x="626" y="12" width="142" height="28" rx="6" fill="#eab308"/>
  <rect x="652" y="20" width="90" height="10" rx="3" fill="#0a0a0a" opacity="0.9"/>

  <!-- Hero section - dramatic dark -->
  <!-- Big bold headline - bright on dark -->
  <rect x="32" y="72" width="180" height="10" rx="3" fill="#eab308" opacity="0.7"/>
  <rect x="32" y="96" width="420" height="36" rx="4" fill="#f5f5f5" opacity="0.92"/>
  <rect x="32" y="140" width="380" height="26" rx="4" fill="#f5f5f5" opacity="0.75"/>
  <rect x="32" y="174" width="300" height="16" rx="4" fill="#eab308" opacity="0.5"/>
  <!-- Subtext -->
  <rect x="32" y="204" width="340" height="9" rx="3" fill="#a3a3a3" opacity="0.5"/>
  <rect x="32" y="220" width="280" height="9" rx="3" fill="#a3a3a3" opacity="0.38"/>
  <!-- CTAs -->
  <rect x="32" y="248" width="160" height="40" rx="6" fill="#eab308"/>
  <rect x="60" y="262" width="104" height="12" rx="3" fill="#0a0a0a" opacity="0.9"/>
  <rect x="208" y="248" width="150" height="40" rx="6" fill="none" stroke="#eab308" stroke-width="1.5"/>
  <rect x="232" y="262" width="102" height="12" rx="3" fill="#eab308" opacity="0.75"/>

  <!-- Right side - dramatic barber visual -->
  <rect x="480" y="60" width="288" height="240" rx="8" fill="#141414"/>
  <rect x="480" y="60" width="288" height="240" rx="8" fill="none" stroke="#2a2a00" stroke-width="1.5"/>
  <!-- Scissors silhouette -->
  <line x1="552" y1="100" x2="624" y2="180" stroke="#eab308" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="624" y1="100" x2="552" y2="180" stroke="#eab308" stroke-width="2" stroke-opacity="0.5"/>
  <circle cx="548" cy="96" r="8" fill="none" stroke="#eab308" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="628" cy="96" r="8" fill="none" stroke="#eab308" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Barber pole stripes -->
  <rect x="680" y="80" width="16" height="200" rx="4" fill="#1c1c1c"/>
  <rect x="680" y="80" width="16" height="40" rx="2" fill="#eab308" opacity="0.7"/>
  <rect x="680" y="136" width="16" height="40" rx="2" fill="#f5f5f5" opacity="0.4"/>
  <rect x="680" y="192" width="16" height="40" rx="2" fill="#eab308" opacity="0.7"/>
  <rect x="680" y="248" width="16" height="32" rx="2" fill="#f5f5f5" opacity="0.4"/>
  <ellipse cx="688" cy="80" rx="9" ry="6" fill="#a3a3a3" opacity="0.4"/>
  <ellipse cx="688" cy="281" rx="9" ry="6" fill="#a3a3a3" opacity="0.4"/>
  <!-- Golden glow behind -->
  <circle cx="600" cy="180" r="60" fill="#ca8a04" opacity="0.08" filter="url(#br-glow-sm)"/>

  <!-- Stats bar - dark cards -->
  <rect x="0" y="316" width="800" height="72" fill="#111111" opacity="0.95"/>
  <rect x="0" y="316" width="800" height="1" fill="#2a2a00"/>
  <rect x="0" y="387" width="800" height="1" fill="#2a2a00"/>
  <rect x="60" y="328" width="120" height="22" rx="4" fill="#eab308" opacity="0.85"/>
  <rect x="56" y="357" width="128" height="8" rx="3" fill="#a3a3a3" opacity="0.4"/>
  <rect x="255" y="328" width="90" height="22" rx="4" fill="#f5f5f5" opacity="0.7"/>
  <rect x="250" y="357" width="100" height="8" rx="3" fill="#a3a3a3" opacity="0.4"/>
  <rect x="450" y="328" width="90" height="22" rx="4" fill="#eab308" opacity="0.85"/>
  <rect x="446" y="357" width="100" height="8" rx="3" fill="#a3a3a3" opacity="0.4"/>
  <rect x="640" y="328" width="110" height="22" rx="4" fill="#f5f5f5" opacity="0.7"/>
  <rect x="638" y="357" width="114" height="8" rx="3" fill="#a3a3a3" opacity="0.4"/>

  <!-- Service grid - dark cards -->
  <rect x="32" y="400" width="220" height="88" rx="8" fill="#141414"/>
  <rect x="32" y="400" width="220" height="88" rx="8" fill="none" stroke="#2a2a00" stroke-width="1"/>
  <rect x="50" y="418" width="8" height="8" rx="1" fill="#eab308" opacity="0.8"/>
  <rect x="66" y="416" width="110" height="12" rx="3" fill="#f5f5f5" opacity="0.8"/>
  <rect x="50" y="440" width="170" height="8" rx="3" fill="#a3a3a3" opacity="0.35"/>
  <rect x="50" y="454" width="140" height="8" rx="3" fill="#a3a3a3" opacity="0.25"/>
  <rect x="50" y="468" width="80" height="10" rx="3" fill="#eab308" opacity="0.55"/>

  <rect x="268" y="400" width="220" height="88" rx="8" fill="#141414"/>
  <rect x="268" y="400" width="220" height="88" rx="8" fill="none" stroke="#2a2a00" stroke-width="1"/>
  <rect x="286" y="418" width="8" height="8" rx="1" fill="#eab308" opacity="0.8"/>
  <rect x="302" y="416" width="90" height="12" rx="3" fill="#f5f5f5" opacity="0.8"/>
  <rect x="286" y="440" width="160" height="8" rx="3" fill="#a3a3a3" opacity="0.35"/>
  <rect x="286" y="454" width="130" height="8" rx="3" fill="#a3a3a3" opacity="0.25"/>
  <rect x="286" y="468" width="80" height="10" rx="3" fill="#eab308" opacity="0.55"/>

  <rect x="504" y="400" width="220" height="88" rx="8" fill="#141414"/>
  <rect x="504" y="400" width="220" height="88" rx="8" fill="none" stroke="#2a2a00" stroke-width="1"/>
  <rect x="522" y="418" width="8" height="8" rx="1" fill="#eab308" opacity="0.8"/>
  <rect x="538" y="416" width="120" height="12" rx="3" fill="#f5f5f5" opacity="0.8"/>
  <rect x="522" y="440" width="150" height="8" rx="3" fill="#a3a3a3" opacity="0.35"/>
  <rect x="522" y="454" width="120" height="8" rx="3" fill="#a3a3a3" opacity="0.25"/>
  <rect x="522" y="468" width="80" height="10" rx="3" fill="#eab308" opacity="0.55"/>
</svg>
